<!DOCTYPE html>
<html lang="en">
<head>
    <title>Formularios</title>
</head>
<body>
    <form>
        <input type="text" required name="username" placeholder="Your name" minlength="3">
        <input type="email" name="email" placeholder="Your email">
        <input type="password" name="password" placeholder="Your password">
        <input type="Checkbox" name="accept" value="yes">
        <input type="radio">
        <input type="date">
        <input type="file">
        <input type="color">
        <input type="submit" value="Mandar Form">
    </form>
</body>
</html>
